<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="fragments/header :: head">
    <title>Add New User</title>
    <style>
        .highlight-input {
            background-color: #fff3cd;
        }
        .btn-green {
            background-color: #28a745;
            color: white;
        }
        .btn-green:hover {
            background-color: #218838;
            color: white;
        }
    </style>
</head>
<body>
<div th:replace="fragments/header :: navbar"></div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 bg-light vh-100 p-3">
            <ul class="nav flex-column">
                <!-- Пункт Admin показываем только если у пользователя есть роль ADMIN -->
                <li sec:authorize="hasRole('ADMIN')" class="nav-item mb-2">
                    <a th:href="@{/admin}" class="nav-link text-dark" th:classappend="${#httpServletRequest.requestURI.contains('/admin')} ? 'active bg-primary text-white' : ''">Admin</a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/user}" class="nav-link text-dark" th:classappend="${#httpServletRequest.requestURI.contains('/user')} ? 'active bg-primary text-white' : ''">User</a>
                </li>
            </ul>
        </div>

        <div class="col-md-10">
            <div class="container mt-4">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <h1 class="mb-4">Admin panel</h1>

                        <div class="card">
                            <div class="card-header">
                                <div class="d-flex gap-3">
                                    <a th:href="@{/admin}"
                                       class="text-decoration-none text-dark">
                                        Users table
                                    </a>
                                    <a th:href="@{/admin/new}"
                                       class="text-decoration-none text-primary fw-bold">
                                        New User
                                    </a>
                                </div>
                            </div>
                            <div class="card-body">
                                <h4 class="mb-4">Add new user</h4>

                                <form th:action="@{/admin/save}" th:object="${user}" method="post">
                                    <div class="mb-3">
                                        <label class="form-label">First name</label>
                                        <input type="text" class="form-control highlight-input" th:field="*{firstName}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Last name</label>
                                        <input type="text" class="form-control highlight-input" th:field="*{lastName}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Age</label>
                                        <input type="number" class="form-control" th:field="*{age}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control highlight-input" th:field="*{email}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Password</label>
                                        <input type="password" class="form-control" th:field="*{password}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Role</label>
                                        <select class="form-select" name="roles" multiple size="2">
                                            <option th:each="role : ${allRoles}"
                                                    th:value="${role.id}"
                                                    th:selected="${user.roles.contains(role)}"
                                                    th:text="${role.name}"></option>
                                        </select>
                                        <div class="form-text">Hold Ctrl (Cmd) to select multiple roles</div>
                                    </div>
                                    <div class="mt-4 text-center">
                                        <button type="submit" class="btn btn-success px-4">Add new user</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
