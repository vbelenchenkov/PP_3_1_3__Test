<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="fragments/header :: head">
    <title>Admin Panel</title>
</head>
<body>
<div th:replace="fragments/header :: navbar"></div>

<div class="container-fluid">
    <div class="row">
        <!-- Левая навигация -->
        <div class="col-md-2 bg-light vh-100 p-3">
            <ul class="nav flex-column">
                <li sec:authorize="hasRole('ADMIN')" class="nav-item mb-2">
                    <a th:href="@{/admin}" class="nav-link text-dark active bg-primary text-white">Admin</a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/user}" class="nav-link text-dark">User</a>
                </li>
            </ul>
        </div>

        <!-- Правая часть с таблицей -->
        <div class="col-md-10">
            <div class="container mt-4">
                <div class="row justify-content-center">
                    <div class="col-md-10">
                        <h1 class="mb-4">Admin panel</h1>

                        <div class="card">
                            <div class="card-header">
                                <div class="d-flex gap-3">
                                    <a th:href="@{/admin}" class="text-decoration-none text-primary fw-bold">Users table</a>
                                    <a th:href="@{/admin/new}" class="text-decoration-none text-dark">New User</a>
                                </div>
                            </div>
                            <div class="card-body">
                                <!-- Строка "All users" с серым фоном -->
                                <div class="bg-light p-2 mb-3 rounded">
                                    <strong>All users</strong>
                                </div>

                                <table class="table table-striped table-bordered">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>First Name</th>
                                        <th>Last Name</th>
                                        <th>Age</th>
                                        <th>Email</th>
                                        <th>Roles</th>
                                        <th>Edit</th>
                                        <th>Delete</th>
                                    </thead>
                                    </thead>
                                    <tbody>
                                    <tr th:each="user : ${users}">
                                        <td th:text="${user.id}">1</td>
                                        <td th:text="${user.firstName}">Anna</td>
                                        <td th:text="${user.lastName}">Smith</td>
                                        <td th:text="${user.age}">25</td>
                                        <td th:text="${user.email}">anna@example.com</td>
                                        <td>
                                            <span th:each="role, iterStat : ${user.roles}">
                                                <span th:text="${role.name}">ROLE_USER</span>
                                                <span th:if="${!iterStat.last}">, </span>
                                            </span>
                                        </td>
                                        <td>
                                            <a th:href="@{/admin/edit/{id}(id=${user.id})}" class="btn btn-sm btn-primary">Edit</a>
                                        </td>
                                        <td>
                                            <form th:action="@{/admin/delete/{id}(id=${user.id})}" method="post" style="display: inline;">
                                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this user?')">Delete</button>
                                            </form>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
