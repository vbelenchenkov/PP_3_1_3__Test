<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="fragments/header :: head">
    <title>Admin Panel</title>
    <style>
        .table th, .table td {
            border-top: 1px solid #dee2e6;
            border-bottom: none;
            border-left: none;
            border-right: none;
        }
        .table thead th {
            border-bottom-width: 2px;
        }
        .table-striped>tbody>tr:nth-of-type(odd) {
            background-color: #f8f9fa;
        }
        .tabs-container a.tab-link,
        .tabs-container a.tab-link.active,
        .tabs-container a.tab-link:not(.active) {
            text-decoration: none !important;
            background-color: #e9ecef !important;
            color: #0d6efd !important;
            transition: background-color 0.2s, color 0.2s;
        }
        .tabs-container a.tab-link.active {
            background-color: white !important;
            color: #212529 !important;
            border-bottom: 1px solid white !important;
            margin-bottom: -1px;
        }
        .tabs-container a.tab-link:not(.active):hover {
            background-color: #dee2e6 !important;
            color: #0a58ca !important;
        }
        .tabs-container {
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 0;
        }
        .all-users-header {
            background-color: #e9ecef;
            padding: 0.5rem 1rem;
            padding-left: 6mm;
            margin: 0;
            font-weight: 500;
            border-top: 1px solid #dee2e6;
            border-bottom: 1px solid #dee2e6;
        }
        .card {
            border-top: none;
        }
        .card-header {
            background: transparent;
            border-bottom: none;
            padding: 0;
        }
        .modal-body .form-label {
            font-weight: bold;
            text-align: center;
            width: 100%;
        }
        .modal-body .w-33 {
            width: 33.33% !important;
        }
        @media (max-width: 768px) {
            .modal-body .w-33 {
                width: 80% !important;
            }
        }
    </style>
</head>
<body>
<div th:replace="fragments/header :: navbar"></div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 bg-white vh-100 p-3">
            <ul class="nav flex-column">
                <li sec:authorize="hasRole('ADMIN')" class="nav-item mb-2">
                    <a th:href="@{/admin}" class="nav-link text-dark"
                       th:classappend="${#httpServletRequest.requestURI == '/admin' ? 'active bg-primary text-white' :
                       ''}">Admin</a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/user}" class="nav-link text-dark"
                       th:classappend="${#httpServletRequest.requestURI == '/user' ? 'active bg-primary text-white' :
                       ''}">User</a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 bg-light">
            <div class="container-fluid mt-4">
                <div class="row">
                    <div class="col-12">
                        <div class="bg-light p-3 rounded mb-0">
                            <h1 class="mb-3">Admin panel</h1>
                            <div class="tabs-container d-flex gap-2">
                                <a th:href="@{/admin}"
                                   class="tab-link"
                                   th:classappend="${#httpServletRequest.requestURI == '/admin' ? 'active' : ''}">
                                    Users table
                                </a>
                                <a th:href="@{/admin/new}"
                                   class="tab-link"
                                   th:classappend="${#httpServletRequest.requestURI == '/admin/new' ? 'active' : ''}">
                                    New User
                                </a>
                            </div>
                        </div>
                        <div class="bg-white pt-3 pb-4 px-3 rounded mb-0">


                            <div class="all-users-header">
                                All users
                            </div>
                            <div class="table-responsive">
                                <table class="table table-striped mb-0">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>First Name</th>
                                        <th>Last Name</th>
                                        <th>Age</th>
                                        <th>Email</th>
                                        <th>Roles</th>
                                        <th>Edit</th>
                                        <th>Delete</th>
                                    </thead>
                                    </thead>
                                    <tbody>
                                    <tr th:each="user : ${users}">
                                        <td th:text="${user.id}">1</td>
                                        <td th:text="${user.firstName}">Anna</td>
                                        <td th:text="${user.lastName}">Smith</td>
                                        <td th:text="${user.age}">25</td>
                                        <td th:text="${user.email}">anna@example.com</td>
                                        <td>
                                                    <span th:each="role, iterStat : ${user.roles}">
                                                        <span th:text="${role.displayName}">ROLE_USER</span>
                                                        <span th:if="${!iterStat.last}"> </span>
                                                    </span>
                                        </td>
                                        <td>
                                            <button type="button" class="btn btn-sm btn-primary"
                                                    data-bs-toggle="modal" data-bs-target="#editUserModal"
                                                    th:data-user-id="${user.id}"
                                                    th:data-user-firstname="${user.firstName}"
                                                    th:data-user-lastname="${user.lastName}"
                                                    th:data-user-age="${user.age}"
                                                    th:data-user-email="${user.email}">Edit</button>
                                        </td>
                                        <td>
                                            <button type="button" class="btn btn-sm btn-danger"
                                                    data-bs-toggle="modal" data-bs-target="#deleteUserModal"
                                                    th:data-user-id="${user.id}"
                                                    th:data-user-firstname="${user.firstName}"
                                                    th:data-user-lastname="${user.lastName}"
                                                    th:data-user-age="${user.age}"
                                                    th:data-user-email="${user.email}"
                                                    th:data-user-roles="${user.roleNames}">Delete</button>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editUserModalLabel">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/admin/update}" method="post">
                <div class="modal-body">
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">ID</label>
                        <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="editUserIdDisplay">—</div>
                        <input type="hidden" name="id" id="editUserId">
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control text-start w-30" name="firstName" id="editFirstName" required>
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control text-start w-30" name="lastName" id="editLastName" required>
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control text-start w-30" name="age" id="editAge" required>
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control text-start w-30" name="email" id="editEmail" required>
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control text-start w-30" name="password">
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">Role</label>
                        <select class="form-select text-start w-30" name="roles" multiple size="2">
                            <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.displayName}"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Edit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteUserModal" tabindex="-1" aria-labelledby="deleteUserModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteUserModalLabel">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">ID</label>
                    <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="deleteUserIdDisplay"></div>
                </div>
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">First Name</label>
                    <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="deleteUserFirstName"></div>
                </div>
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">Last Name</label>
                    <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="deleteUserLastName"></div>
                </div>
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">Age</label>
                    <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="deleteUserAge"></div>
                </div>
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">Email</label>
                    <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="deleteUserEmail"></div>
                </div>
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">Roles</label>
                    <ul class="list-unstyled bg-secondary bg-opacity-10 p-2 rounded text-start w-30 mb-0"
                        id="deleteUserRolesList"></ul>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <form th:action="@{/admin/delete}" method="post">
                    <input type="hidden" name="id" id="deleteUserId">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const editModal = document.getElementById('editUserModal');
    if (editModal) {
        editModal.addEventListener('show.bs.modal', function(event) {
            const button = event.relatedTarget;
            const userId = button.getAttribute('data-user-id');
            const firstName = button.getAttribute('data-user-firstname');
            const lastName = button.getAttribute('data-user-lastname');
            const age = button.getAttribute('data-user-age');
            const email = button.getAttribute('data-user-email');

            document.getElementById('editUserIdDisplay').textContent = userId;
            document.getElementById('editUserId').value = userId;
            document.getElementById('editFirstName').value = firstName;
            document.getElementById('editLastName').value = lastName;
            document.getElementById('editAge').value = age;
            document.getElementById('editEmail').value = email;
        });
    }

    const deleteModal = document.getElementById('deleteUserModal');
    if (deleteModal) {
        deleteModal.addEventListener('show.bs.modal', function(event) {
            const button = event.relatedTarget;
            const userId = button.getAttribute('data-user-id');
            const firstName = button.getAttribute('data-user-firstname');
            const lastName = button.getAttribute('data-user-lastname');
            const age = button.getAttribute('data-user-age');
            const email = button.getAttribute('data-user-email');
            const rolesString = button.getAttribute('data-user-roles');

            document.getElementById('deleteUserId').value = userId;
            document.getElementById('deleteUserIdDisplay').textContent = userId;
            document.getElementById('deleteUserFirstName').textContent = firstName;
            document.getElementById('deleteUserLastName').textContent = lastName;
            document.getElementById('deleteUserAge').textContent = age;
            document.getElementById('deleteUserEmail').textContent = email;

            const rolesList = document.getElementById('deleteUserRolesList');
            rolesList.innerHTML = '';
            if (rolesString) {
                const rolesArray = rolesString.split(',').map(r => r.trim()).filter(r => r);
                rolesArray.forEach(role => {
                    const li = document.createElement('li');
                    li.textContent = role;
                    li.classList.add('mb-1');
                    rolesList.appendChild(li);
                });
            } else {
                const li = document.createElement('li');
                li.textContent = '—';
                rolesList.appendChild(li);
            }
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

<style>

    .all-users-header {
        background-color: #e9ecef;
        padding: 0.5rem 1rem;
        padding-left: 6mm;
        margin: 0;
        font-weight: 500;
        font-size: 1.6rem;
        border-top: 1px solid #dee2e6;
        border-bottom: 1px solid #dee2e6;
    }
    .tabs-container {
        margin-bottom: 0 !important;
    }
    .all-users-header {
        margin-top: 0 !important;
    }
    .admin-panel-content .col-12 {
        margin-bottom: 0;
        padding-bottom: 0;
    }

    .bg-light.p-3.rounded,
    .bg-white.p-3.rounded {
        width: 100%;
        box-sizing: border-box;
    }
    .w-30 {
        width: 30% !important;
        min-width: 200px;
    }
    #editUserModal .form-label,
    #deleteUserModal .form-label {
        font-weight: 700 !important;
    }
</style>
</html>
