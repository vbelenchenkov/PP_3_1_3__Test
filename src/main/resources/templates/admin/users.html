<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="fragments/header :: head">
    <title>Admin Panel</title>
</head>
<body>
<div th:replace="fragments/header :: navbar"></div>

<div class="container-fluid">
    <div class="row">
        <!-- Левая навигация -->
        <div class="col-md-2 bg-light vh-100 p-3">
            <ul class="nav flex-column">
                <li sec:authorize="hasRole('ADMIN')" class="nav-item mb-2">
                    <a th:href="@{/admin}" class="nav-link text-dark active bg-primary text-white">Admin</a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/user}" class="nav-link text-dark">User</a>
                </li>
            </ul>
        </div>

        <!-- Правая часть с таблицей -->
        <div class="col-md-10">
            <div class="container mt-4">
                <div class="row justify-content-center">
                    <div class="col-md-10">
                        <h1 class="mb-4">Admin panel</h1>

                        <div class="card">
                            <div class="card-header">
                                <div class="d-flex gap-3">
                                    <a th:href="@{/admin}" class="text-decoration-none text-primary fw-bold">Users table</a>
                                    <a th:href="@{/admin/new}" class="text-decoration-none text-dark">New User</a>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="bg-light p-2 mb-3 rounded">
                                    <strong>All users</strong>
                                </div>

                                <table class="table table-striped table-bordered">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>First Name</th>
                                        <th>Last Name</th>
                                        <th>Age</th>
                                        <th>Email</th>
                                        <th>Roles</th>
                                        <th>Edit</th>
                                        <th>Delete</th>
                                    </thead>
                                    </thead>
                                    <tbody>
                                    <tr th:each="user : ${users}">
                                        <td th:text="${user.id}">1</td>
                                        <td th:text="${user.firstName}">Anna</td>
                                        <td th:text="${user.lastName}">Smith</td>
                                        <td th:text="${user.age}">25</td>
                                        <td th:text="${user.email}">anna@example.com</td>
                                        <td>
                                                    <span th:each="role, iterStat : ${user.roles}">
                                                        <span th:text="${role.name}">ROLE_USER</span>
                                                        <span th:if="${!iterStat.last}">, </span>
                                                    </span>
                                        </td>
                                        <td>
                                            <button type="button"
                                                    class="btn btn-sm btn-primary"
                                                    data-bs-toggle="modal"
                                                    data-bs-target="#editUserModal"
                                                    th:data-user-id="${user.id}"
                                                    th:data-user-firstname="${user.firstName}"
                                                    th:data-user-lastname="${user.lastName}"
                                                    th:data-user-age="${user.age}"
                                                    th:data-user-email="${user.email}">
                                                Edit
                                            </button>
                                        </td>
                                        <td>
                                            <form th:action="@{/admin/delete/{id}(id=${user.id})}" method="post" style="display: inline;">
                                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this user?')">Delete</button>
                                            </form>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для редактирования -->
<div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editUserModalLabel">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/admin/update}" method="post" id="editUserForm">
                <input type="hidden" name="id" id="editUserId">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">First name</label>
                        <input type="text" class="form-control" name="firstName" id="editFirstName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last name</label>
                        <input type="text" class="form-control" name="lastName" id="editLastName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" name="age" id="editAge" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" id="editEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="Leave blank to keep current">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select class="form-select" name="roles" multiple size="2" id="editRoles">
                            <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name}"></option>
                        </select>
                        <div class="form-text">Hold Ctrl (Cmd) to select multiple roles</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Edit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // JavaScript для заполнения модального окна данными пользователя
    const editUserModal = document.getElementById('editUserModal');
    if (editUserModal) {
        editUserModal.addEventListener('show.bs.modal', function(event) {
            const button = event.relatedTarget;
            const userId = button.getAttribute('data-user-id');
            const firstName = button.getAttribute('data-user-firstname');
            const lastName = button.getAttribute('data-user-lastname');
            const age = button.getAttribute('data-user-age');
            const email = button.getAttribute('data-user-email');

            document.getElementById('editUserId').value = userId;
            document.getElementById('editFirstName').value = firstName;
            document.getElementById('editLastName').value = lastName;
            document.getElementById('editAge').value = age;
            document.getElementById('editEmail').value = email;
        });
    }
</script>
</body>
</html>
