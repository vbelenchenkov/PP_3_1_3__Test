<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8">
    <title>User List</title>
</head>
<body>
<h1>Welcome, <span sec:authentication="name">User</span>!</h1>

<h2>User List</h2>

<table border="1" cellpadding="5">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.name}">Anna</td>
        <td th:text="${user.email}">anna@example.com</td>
        <td th:text="${user.age}">25</td>
        <td>
            <a th:href="@{/users/edit/{id}(id=${user.id})}">Edit</a>
            |
            <a th:href="@{/users/delete/{id}(id=${user.id})}"
               onclick="return confirm('Delete this user?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

<br/>
<a th:href="@{/users/new}">Add New User</a>

<br/><br/>
<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>
</body>
</html>
