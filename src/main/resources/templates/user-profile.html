<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="fragments/header :: head">
    <title>User Profile</title>
</head>
<body>
<div th:replace="fragments/header :: navbar"></div>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-2 bg-white vh-100 p-3">
            <ul class="nav flex-column">
                <li sec:authorize="hasRole('ADMIN')" class="nav-item mb-2">
                    <a th:href="@{/admin}" class="nav-link text-dark"
                       th:classappend="${#httpServletRequest.requestURI.contains('/admin')} ?
                       'active bg-primary text-white' : ''">Admin</a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/user}" class="nav-link text-dark active bg-primary text-white">User</a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 bg-light">
            <div class="container-fluid mt-4">
                <div class="row">
                    <div class="col-12">
                        <div class="bg-secondary bg-opacity-10 p-3 rounded mb-0">
                            <h1 class="mb-3">User information-page</h1>
                        </div>

                        <div class="bg-white pt-3 pb-4 px-3 rounded">
                            <div class="all-users-header">
                                About user
                            </div>
                            <div class="table-responsive">
                                <table class="table table-striped mb-0">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>First Name</th>
                                        <th>Last Name</th>
                                        <th>Age</th>
                                        <th>Email</th>
                                        <th>Roles</th>
                                    </thead>
                                    </thead>
                                    <tbody>
                                    <tr th:each="user : ${users}">
                                        <td th:text="${user.id}">1</td>
                                        <td th:text="${user.firstName}">John</td>
                                        <td th:text="${user.lastName}">Doe</td>
                                        <td th:text="${user.age}">30</td>
                                        <td th:text="${user.email}">user@example.com</td>
                                        <td>
                                            <span th:each="role, iterStat : ${user.roles}">
                                                <span th:text="${#strings.replace(role.name, 'ROLE_', '')}">USER</span>
                                                <span th:if="${!iterStat.last}"> </span>
                                            </span>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
