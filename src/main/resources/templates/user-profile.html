<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="fragments/header :: head">
    <title>User Profile</title>
</head>
<body>
<div th:replace="fragments/header :: navbar"></div>

<div class="container-fluid">
    <div class="row">
        <!-- Левая навигация -->
        <div class="col-md-2 bg-light vh-100 p-3">
            <ul class="nav flex-column">
                <!-- Пункт Admin показываем только если у пользователя есть роль ADMIN -->
                <li sec:authorize="hasRole('ADMIN')" class="nav-item mb-2">
                    <a th:href="@{/admin}" class="nav-link text-dark" th:classappend="${#httpServletRequest.requestURI.contains('/admin')} ? 'active bg-primary text-white' : ''">Admin</a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/user}" class="nav-link text-dark" th:classappend="${#httpServletRequest.requestURI.contains('/user')} ? 'active bg-primary text-white' : ''">User</a>
                </li>
            </ul>
        </div>

        <!-- Правая часть с профилем -->
        <div class="col-md-10">
            <div class="container mt-4">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <h1 class="mb-4">User information-page</h1>

                        <div class="card">
                            <div class="card-header">
                                <span>About user</span>
                            </div>
                            <div class="card-body">
                                <table class="table table-bordered">
                                    <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>First Name</th>
                                        <th>Last Name</th>
                                        <th>Age</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                    </thead>
                                    </thead>
                                    <tbody>
                                    <tr th:each="user : ${users}">
                                        <td th:text="${user.id}">1</td>
                                        <td th:text="${user.firstName}">John</td>
                                        <td th:text="${user.lastName}">Doe</td>
                                        <td th:text="${user.age}">30</td>
                                        <td th:text="${user.email}">user@example.com</td>
                                        <td>
                                                    <span th:each="role, iterStat : ${user.roles}">
                                                        <span th:text="${role.name}">ROLE_USER</span>
                                                        <span th:if="${!iterStat.last}">, </span>
                                                    </span>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
